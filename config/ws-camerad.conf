# ws-camerad Configuration File
#
# High-performance multi-consumer camera daemon for Raspberry Pi
# Lines starting with # or ; are comments.

[daemon]
# Control socket path (in RuntimeDirectory)
socket_path = /run/ws-camerad/control.sock

# Output directories for stills and clips
stills_dir = /var/lib/ws-camerad/stills
clips_dir = /var/lib/ws-camerad/clips

# Shared memory names for frame distribution
shm_name = /ws_camerad_frames

# Ring buffer size (seconds of encoded video to keep in memory)
ring_buffer_seconds = 30

# Raw frame buffer size (seconds of unencoded frames for past stills)
# Set to 0 to disable. At 1280x960@30fps, each second costs ~55 MB.
raw_buffer_seconds = 5

# Post-event recording duration (seconds)
post_event_seconds = 10

# Enable RTSP streaming
enable_rtsp = true
rtsp_port = 8554

# Enable raw frame sharing via shared memory (YUV420 format)
# Set to true if you want local consumers to access raw YUV frames
enable_raw_sharing = true

# Enable BGR frame sharing via shared memory (for OpenCV consumers)
# The daemon converts YUV420 to BGR24 once, consumers get ready-to-use frames
enable_bgr_sharing = true

[camera]
# Video resolution (use 4:3 aspect ratio to match IMX219 sensor for full FOV)
# 1280x960 gives full field of view; 1280x720 would crop to 16:9
width = 1280
height = 960

# Frame rate
framerate = 30

# Encoder bitrate (bits per second)
bitrate = 4000000

# Keyframe interval (frames between keyframes)
# Set to framerate for one keyframe per second
keyframe_interval = 30

# Camera tuning file for libcamera (optional)
# For NoIR camera modules, use the _noir variant for proper AWB:
#   imx219_noir.json   (Camera Module v2 NoIR)
#   imx477_noir.json   (HQ Camera NoIR)
#   imx708_noir.json   (Camera Module v3 NoIR)
# Just the filename is enough; full path is resolved automatically.
# Leave commented out for standard (non-NoIR) modules.
# tuning_file = imx219_noir.json

# Hardware encoder codec (h264 or h265)
codec = h264

# Frame rotation in degrees (0, 90, 180, 270)
# 0 and 180 are free (handled by ISP hardware)
# 90 and 270 use NEON-optimized software rotation (~1-2ms/frame)
# rotation = 0

# Horizontal and vertical flip (mirror), handled by ISP hardware (free)
# These compose with rotation: e.g. rotation=180 + hflip = vflip
# hflip = false
# vflip = false

# ========================================
# VIRTUAL CAMERA OUTPUTS (v4l2loopback)
# ========================================
# Create virtual V4L2 devices that any application can use as a camera source.
# Requires the v4l2loopback kernel module:
#   sudo modprobe v4l2loopback devices=2 video_nr=10,11 card_label="Virtual Cam 1","Virtual Cam 2"
#
# The daemon writes rotated frames to these devices so any V4L2 consumer
# (OpenCV, ffmpeg, browsers, etc.) can read them as a standard camera.
#
# Zero or more virtual cameras can be configured. If none are configured,
# this feature is simply disabled.

# Example: First virtual camera
# [virtual_camera.0]
# device = /dev/video10
# label = Rotated Camera
# enabled = true

# Example: Second virtual camera (e.g., different output format or for testing)
# [virtual_camera.1]
# device = /dev/video11
# label = Secondary Output
# enabled = true
